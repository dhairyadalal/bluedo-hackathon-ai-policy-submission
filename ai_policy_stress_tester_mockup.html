<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Policy Stress Tester</title>
<style>
:root{
  --navy:#0f1f3d;--navy-2:#16294f;--teal:#0f766e;--teal-light:#e6f5f3;
  --ink:#1a2233;--muted:#5c6478;--line:#e2e5ec;--bg:#f4f5f8;--card:#fff;
  --amber:#b45309;--amber-bg:#fef3e2;--red:#b3261e;--red-bg:#fdeceb;
  --green:#166534;--green-bg:#eaf6ec;--gray:#6b7280;--gray-bg:#f3f4f6;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}

/* Topbar */
.topbar{background:var(--navy);color:#fff;padding:15px 24px;}
.topbar h1{margin:0 0 3px;font-size:18px;font-weight:700;letter-spacing:-.01em;}
.topbar p{margin:0;font-size:12px;color:#c9d2e6;max-width:600px;}
.badge{display:inline-block;background:#28407a;color:#dce6ff;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:2px;}

/* Stage bar */
.stagebar{display:flex;background:#fff;border-bottom:2px solid var(--line);padding:0 18px;overflow-x:auto;}
.stagebtn{padding:11px 14px;font-size:13px;color:var(--muted);border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s;margin-bottom:-2px;}
.stagebtn:hover{color:var(--navy);}
.stagebtn.active{color:var(--navy);font-weight:600;border-bottom-color:var(--teal);}
.stagenum{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--line);color:var(--muted);font-size:10px;font-weight:600;}
.stagebtn.active .stagenum,.stagebtn.done .stagenum{background:var(--teal);color:#fff;}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 102px);}
.leftpane{width:320px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;}
.canvas{flex:1;padding:22px 26px;overflow-y:auto;max-height:calc(100vh - 102px);}

/* Left pane */
.lsection{padding:14px 16px;border-bottom:1px solid var(--line);}
.lsection h3{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;}
.laction{margin:auto 0 0;padding:14px 16px;border-top:1px solid var(--line);}

/* Scenario selector */
.sc-card{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;background:#fff;text-align:left;width:100%;transition:border-color .15s,background .15s;}
.sc-card:hover{border-color:var(--teal);background:var(--teal-light);}
.sc-card.selected{border-color:var(--teal);background:var(--teal-light);}
.sc-card:last-child{margin-bottom:0;}
.sc-label{font-size:11px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.sc-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.sc-desc{font-size:12px;color:var(--muted);line-height:1.4;}

/* Status badges */
.sbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.sbadge.present{background:var(--green-bg);color:var(--green);}
.sbadge.partial{background:var(--amber-bg);color:var(--amber);}
.sbadge.missing{background:var(--red-bg);color:var(--red);}
.sbadge.not-assessed{background:var(--gray-bg);color:var(--gray);}
.cbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg);color:var(--muted);border:1px solid var(--line);}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:14px;}
.panel-title{font-size:17px;margin:0 0 3px;color:var(--navy);}
.panel-sub{font-size:13px;color:var(--muted);margin:0 0 18px;}

/* Meta grid */
.metagrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12.5px;}
.mk{color:var(--muted);margin-bottom:2px;font-size:11px;}
.mv{color:var(--ink);font-weight:500;line-height:1.3;}
.taglist{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{display:inline-block;font-size:11px;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:2px 8px;border-radius:12px;}

/* Rubric */
.rubric-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.rubric-row:last-child{border-bottom:none;}
.rubric-n{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.rubric-body{flex:1;}
.rubric-name{font-size:13px;font-weight:600;color:var(--ink);}
.rubric-q{font-size:12px;color:var(--muted);margin:2px 0 5px;line-height:1.4;}
.rubric-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.rubric-rationale{font-size:12.5px;color:var(--ink);line-height:1.45;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:6px;display:none;}
.rubric-rationale.open{display:block;}
.expand-btn{background:none;border:none;color:var(--teal);font-size:11px;cursor:pointer;padding:0;margin-top:4px;}
.expand-btn:hover{text-decoration:underline;}
.report-link{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;text-decoration:underline;padding:0;margin-left:auto;}
.report-link:hover{color:var(--amber);}

/* Response chain */
.chain-wrap{overflow-x:auto;padding:8px 0 20px;}
.chain{display:flex;align-items:flex-start;gap:0;min-width:max-content;}
.chain-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;width:96px;}
.chain-node:hover .chain-dot{transform:scale(1.08);}
.chain-node.sel .chain-dot{box-shadow:0 0 0 3px var(--teal);}
.chain-dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;margin:0 auto 6px;border:2px solid transparent;transition:transform .15s;}
.chain-dot.green{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.chain-dot.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
.chain-dot.red{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.chain-dot.gray{background:var(--gray-bg);color:var(--gray);border-color:var(--gray);}
.chain-label{font-size:11px;color:var(--ink);font-weight:500;line-height:1.3;text-align:center;padding:0 4px;}
.chain-conn{width:28px;height:2px;background:var(--line);flex-shrink:0;align-self:center;margin-bottom:22px;}

/* Chain detail */
.chain-detail{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-top:16px;font-size:13px;animation:fadein .2s ease;}
.chain-dh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.chain-dh h4{margin:0;font-size:14px;color:var(--navy);}
.ds{margin-bottom:8px;}
.ds-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.ds-val{font-size:13px;color:var(--ink);line-height:1.4;}
.evblock{margin-top:10px;padding:10px 12px;background:var(--bg);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;}
.ev-lbl{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.ev-text{font-style:italic;color:var(--ink);line-height:1.5;font-size:12.5px;margin-bottom:4px;}
.ev-src{font-size:11px;color:var(--muted);}
.alist{margin:3px 0 0 16px;padding:0;font-size:12px;color:var(--muted);line-height:1.5;}

/* Failure cards */
.fail-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer;}
.fail-card:hover{border-color:var(--line);}
.fail-header{display:flex;align-items:flex-start;gap:12px;}
.fail-rank{width:28px;height:28px;border-radius:50%;background:var(--red-bg);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.fail-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.fail-summary{font-size:12.5px;color:var(--muted);line-height:1.4;}
.fail-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chain-step-tag{font-size:10px;padding:2px 7px;background:#e4ecfb;color:#1d4ed8;border-radius:6px;font-weight:600;}
.fail-body{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
.fail-body.open{display:block;}
.fail-sec{margin-bottom:10px;}
.fail-sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.fail-sec-val{font-size:13px;color:var(--ink);line-height:1.4;}
.counterarg{padding:8px 10px;background:var(--amber-bg);border-radius:6px;font-size:12px;color:var(--amber);border-left:3px solid var(--amber);}
.actor-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.actor-tag{font-size:11px;background:var(--bg);border:1px solid var(--line);color:var(--muted);padding:2px 7px;border-radius:12px;}

/* Repair plan */
.legal-notice{background:var(--amber-bg);color:var(--amber);border:1px solid #fcd34d;border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:14px;line-height:1.4;}
.repair-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:14px;}
.repair-type{font-size:11px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.repair-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:10px;}
.repair-lang{width:100%;min-height:130px;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13px;font-family:inherit;line-height:1.6;resize:vertical;background:var(--bg);color:var(--ink);}
.repair-lang:focus{outline:2px solid var(--teal);border-color:transparent;}
.repair-footer{margin-top:10px;font-size:12px;color:var(--muted);}
.repair-footer span{margin-right:12px;}
.repair-links a{color:var(--teal);font-size:11px;text-decoration:none;}
.repair-links a:hover{text-decoration:underline;}

/* Buttons */
.btn-primary{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
.btn-primary:hover{background:var(--navy-2);}
.btn-sec{background:#fff;color:var(--navy);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
.btn-sec:hover{border-color:var(--teal);color:var(--teal);}
.btn-dl{background:#fff;color:var(--teal);border:1px solid var(--teal);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
.btn-dl:hover{background:var(--teal-light);}
.actions-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}

/* Source pill */
.spill{display:inline-block;font-size:11px;background:var(--bg);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:12px;margin:2px;cursor:pointer;}
.spill:hover{background:var(--teal-light);border-color:var(--teal);color:var(--navy);}
.spill.unverified{border-color:var(--amber);color:var(--amber);}

/* Integrity notice */
.integrity{background:#f8f9fb;border:1px solid var(--line);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.integrity strong{color:var(--ink);}

/* Panel + animation */
.panel{display:none;}
.panel.visible{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* Left pane mini-failure list */
.mini-fail{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;cursor:pointer;}
.mini-fail:last-child{border-bottom:none;}
.mini-fail:hover{color:var(--teal);}
.mf-rank{width:18px;height:18px;border-radius:50%;background:var(--red-bg);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.mf-title{flex:1;line-height:1.3;color:var(--ink);}

/* Chain legend */
.chain-legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap;}
.chain-legend span{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Mobile layout */
@media(max-width:700px){
  .layout{flex-direction:column;}
  .leftpane{width:100%;border-right:none;border-bottom:1px solid var(--line);max-height:260px;}
  .canvas{padding:14px;}
  .metagrid{grid-template-columns:1fr;}
  .topbar p{display:none;}
  .chain-node{width:76px;}
  .chain-conn{width:14px;}
}

/* Source modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;}
.overlay.hidden{display:none;}
.modal{background:#fff;border-radius:14px;padding:22px 24px;max-width:520px;width:90%;font-size:13px;max-height:80vh;overflow-y:auto;}
.modal h3{margin:0 0 10px;font-size:15px;color:var(--navy);}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);margin-top:-4px;}
.modal-close:hover{color:var(--red);}
.modal-row{display:flex;gap:8px;margin-bottom:6px;font-size:12.5px;}
.modal-key{color:var(--muted);min-width:110px;flex-shrink:0;}
.modal-val{color:var(--ink);word-break:break-word;}
.modal-excerpt{margin-top:10px;padding:10px 12px;background:var(--bg);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;font-size:12.5px;}
.excerpt-type{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}

hr.divider{border:none;border-top:1px solid var(--line);margin:14px 0;}
</style>
</head>
<body>

<div class="topbar">
  <h1>AI Policy Stress Tester <span class="badge">prototype</span></h1>
  <p>See whether an AI policy still works when incentives, evidence, and institutions come under pressure.</p>
</div>

<nav class="stagebar" role="tablist" aria-label="Workflow stages">
  <button class="stagebtn active" data-stage="0" role="tab" aria-selected="true"><span class="stagenum" aria-hidden="true">1</span>Policy</button>
  <button class="stagebtn" data-stage="1" role="tab" aria-selected="false"><span class="stagenum" aria-hidden="true">2</span>Scenario</button>
  <button class="stagebtn" data-stage="2" role="tab" aria-selected="false"><span class="stagenum" aria-hidden="true">3</span>Failure points</button>
  <button class="stagebtn" data-stage="3" role="tab" aria-selected="false"><span class="stagenum" aria-hidden="true">4</span>Repair plan</button>
</nav>

<div class="layout">
  <aside class="leftpane" id="leftpane" aria-label="Controls"></aside>
  <main class="canvas" id="canvas">
    <div class="panel visible" id="panel-0"></div>
    <div class="panel" id="panel-1"></div>
    <div class="panel" id="panel-2"></div>
    <div class="panel" id="panel-3"></div>
  </main>
</div>

<!-- Source detail modal -->
<div class="overlay hidden" id="overlay" role="dialog" aria-modal="true" aria-label="Source detail">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>

const CRITERIA = [
  {id:'c1',name:'Risk definition',q:'Is the relevant harm or capability clearly defined?'},
  {id:'c2',name:'Observable indicator',q:'Is there a measurable warning sign or threshold?'},

This requirement applies regardless of whether the Responsible Party disputes the finding. Failure to provide timely notification shall constitute a reportable breach for the purposes of [applicable regulatory framework].`,
    responsibleActor:'Anthropic / frontier AI developers',
    steps:['Identify or establish the designated government authority','Define "timely" in law and create escalation provisions','Establish a secure reporting channel','Define sanctions for failure to report'],

// ── State ─────────────────────────────────────────────────────────────────────
let currentStage = 0;
let selectedScenario = 'A';
let selectedChainNode = null;

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderAll(){
  renderLeftPane();
  renderStage0(); renderStage1(); renderStage2(); renderStage3();
  document.querySelectorAll('.panel').forEach((p,i)=>{
    p.classList.toggle('visible', i===currentStage);
  });
  document.querySelectorAll('.stagebtn').forEach((b,i)=>{
    b.classList.toggle('active', i===currentStage);
    b.setAttribute('aria-selected', i===currentStage);
  });
  document.getElementById('canvas').scrollTop = 0;
}

function renderLeftPane(){
  const lp = document.getElementById('leftpane');
  if(currentStage===0) lp.innerHTML = leftStage0();
  else if(currentStage===1) lp.innerHTML = leftStage1();
  else if(currentStage===2) lp.innerHTML = leftStage2();
  else lp.innerHTML = leftStage3();
  // bind events
  if(currentStage===1){
    lp.querySelectorAll('.sc-card').forEach(c=>{
      c.addEventListener('click',()=>{ selectedScenario=c.dataset.sc; selectedChainNode=null; renderAll(); });
    });
  }
  if(currentStage===2){
    lp.querySelectorAll('.mini-fail').forEach(mf=>{
      mf.addEventListener('click',()=>{
        const el = document.getElementById('fail-'+mf.dataset.rank);
        if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.querySelector('.fail-body').classList.add('open'); }
      });
    });
  }
  if(currentStage===3){
    const dlBtn = lp.querySelector('#dl-brief');
    if(dlBtn) dlBtn.addEventListener('click', downloadBrief);
  }
}

        <div style="font-style:italic;color:var(--ink);line-height:1.5;font-size:12.5px;">${esc(src.excerpt)}</div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--muted);">
        <strong>Relevance:</strong> ${esc(src.relevance)}<br>
        <strong>Limitations:</strong> ${esc(src.limitations)}
      </div>`;
  }
  document.getElementById('overlay').classList.remove('hidden');
}

// ── Download brief ────────────────────────────────────────────────────────────
function downloadBrief(){
  const sc = SCENARIOS[selectedScenario];
  const fs = FAILURES[selectedScenario]||[];
  const rs = REPAIRS.filter(r=>r.scenario===selectedScenario);
  const chainNodes = CHAIN[selectedScenario]||[];
  const findings = FINDINGS[selectedScenario]||[];

  let md = `# AI Policy Stress Test Report\n\n`;
  md += `**Generated:** ${new Date().toISOString().split('T')[0]}\n\n`;
  md += `---\n\n`;
  md += `## 1. Policy assessed\n\n`;
  md += `**Name:** ${POLICY.name}\n`;
  md += `**Issuing organisation:** ${POLICY.issuingOrg}\n`;
  md += `**Jurisdiction:** ${POLICY.jurisdiction}\n`;
  md += `**Version:** ${POLICY.version}\n`;
  md += `**Type:** ${POLICY.policyType}\n`;
  md += `**Official source:** ${POLICY.officialUrl}\n`;
  md += `**Sources checked through:** ${POLICY.sourcesCheckedThrough}\n\n`;

  md += `## 2. Scenario\n\n`;
  md += `**${sc.label}: ${sc.title}**\n\n${sc.desc}\n\n`;

  md += `## 3. Response-chain results\n\n`;
  chainNodes.forEach(n=>{
    const status = {green:'✅ Specified',amber:'⚠️ Partial',red:'❌ Missing',gray:'◻ Not assessed'}[n.status]||n.status;
    md += `### ${n.label}\n**Status:** ${status}\n**Assessment:** ${n.assessment}\n${n.rationale}\n\n`;
    if(n.missingInfo&&n.missingInfo.length) md += `**Missing:** ${n.missingInfo.join(' · ')}\n\n`;
  });

  md += `## 4. Critical failure points\n\n`;
  fs.forEach(f=>{
    md += `### ${f.rank}. ${f.title}\n${f.summary}\n\n`;
    md += `**Why it matters:** ${f.why}\n\n`;
    md += `**Breaks response chain at:** ${f.chainStep}\n\n`;
    md += `**Minimum repair:** ${f.minRepair}\n\n`;
    md += `**Counterargument:** ${f.counterarg}\n\n`;
  });

  md += `## 5. Repair options\n\n`;
  if(rs.length===0) md += `No repair clauses generated for this scenario.\n\n`;
  rs.forEach(r=>{
    md += `### ${r.type}: ${r.title}\n\n`;
    md += `> **Illustrative language — not legal advice. Legal review required.**\n\n`;
    md += r.lang+'\n\n';
    md += `**Responsible actor:** ${r.responsibleActor}\n\n`;
    md += `**Tradeoffs:** ${r.tradeoffs.join('; ')}\n\n`;
  });

  md += `## 6. Sources\n\n`;
  Object.values(SOURCES).forEach(s=>{
    md += `- **${s.title}** · ${s.issuingBody} · ${s.publicationDate} · [${s.officialUrl}](${s.officialUrl})\n`;
    md += `  ${s.excerptType||'Paraphrase'}: *${s.excerpt.substring(0,200)}*\n`;
    md += `  Limitations: ${s.limitations}\n\n`;
  });

  md += `## 7. Assumptions and limitations\n\n`;
  md += `- This assessment is based on the public version of the policy and may not reflect internal procedures or commitments.\n`;
  md += `- "No evidence located" is not equivalent to "confirmed absent." Internal policies may address gaps not visible in the public document.\n`;
  md += `- Assessment confidence varies by criterion; low-confidence findings should be treated as hypotheses, not conclusions.\n`;
  md += `- Repair clauses are illustrative starting points generated by an AI tool. They require legal review and adaptation to the applicable jurisdiction and institutional authority.\n`;
  md += `- This tool does not produce an overall safety score. The absence of a score is intentional.\n\n`;

  const findings_assumptions = findings.flatMap(f=>f.assumptions||[]).filter(Boolean);
  if(findings_assumptions.length){
    md += `**Assessment-specific assumptions:**\n`;
    [...new Set(findings_assumptions)].forEach(a=>{ md += `- ${a}\n`; });
  }

  const blob = new Blob([md], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `stress-test-brief-${selectedScenario.toLowerCase()}-${new Date().toISOString().split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Report error ──────────────────────────────────────────────────────────────
function reportError(id){
  const msg = `To report a classification error for "${id}", please email feedback with:\n1. The criterion or node ID: ${id}\n2. Your proposed status and evidence\n3. A source you can point to\n\nThis prototype is a research tool — corrections improve the assessment for everyone.`;
  alert(msg);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goStage(n){
  currentStage = n;
  renderAll();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.stagebtn').forEach((btn,i)=>{
  btn.addEventListener('click',()=>goStage(i));
});
document.getElementById('modal-close').addEventListener('click',()=>{
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) document.getElementById('overlay').classList.add('hidden');
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('overlay').classList.add('hidden');
});

// Initial render
renderAll();
</script>
</body>
</html>
