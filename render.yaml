services:
  - type: web
    name: ai-policy-copilot
    runtime: python
    rootDir: rag_pipeline
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false          # you paste the real value in the Render dashboard
      - key: TOKENIZERS_PARALLELISM
        value: "false"
